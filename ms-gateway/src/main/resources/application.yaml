spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-auth-route
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/auth/**
            - id: ms-leagues-route
              uri: ${LEAGUES_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/leagues/**
            - id: ms-teams-route
              uri: ${TEAMS_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/teams/**
            - id: ms-fixtures-route
              uri: ${FIXTURES_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/fixtures/**
            - id: ms-standings-route
              uri: ${STANDINGS_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/standings/**
            - id: ms-notifications-route
              uri: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/notifications/**
            - id: ms-dashboard-route
              uri: ${DASHBOARD_SERVICE_URL:http://localhost:8089}
              predicates:
                - Path=/dashborard/**

management:
  endpoints:
    web:
      exposure:
        include: "health"
