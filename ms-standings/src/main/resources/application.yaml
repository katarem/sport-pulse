server:
  port: 8086

teams:
    url: ${TEAMS_URL}
auth:
  url: ${AUTH_URL}
api:
  allowedServices: ["MS-STANDINGS","MS-FIXTURES", "MS-LEAGUES", "MS-TEAMS", "MS-NOTIFICATIONS", "MS-DASHBOARD"]
  football:
    key: ${FOOTBALL_API_KEY}
    url: ${FOOTBALL_API_URL}
spring:
  application:
    name: ms-standings
  management:
    endpoints:
      web:
        exposure:
          include: health

logging:
  level:
    org:
      springframework:
        security: DEBUG
    com:
      bytecodes: DEBUG